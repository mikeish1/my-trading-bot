name: Daily Trading Recommendation

on:
  schedule:
    # Runs at 9:05 AM Eastern Time, Monday through Friday
    # Handles daylight saving automatically:
    # - 9:05 AM EDT (Mar-Nov) = 13:05 UTC
    # - 9:05 AM EST (Nov-Mar) = 14:05 UTC
    # We run at 13:05 UTC to catch both (8:05 AM EST / 9:05 AM EDT)
    - cron: '5 13 * * 1-5'
  workflow_dispatch:  # Allows manual trigger + on-demand email

jobs:
  generate-recommendation:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent hanging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # Cache pip dependencies for faster runs
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Trading System
        id: run-trading
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          DEFAULT_TICKER: ${{ vars.DEFAULT_TICKER || 'NVDA' }}
          CAPITAL: ${{ vars.CAPITAL || '25000' }}
        continue-on-error: false  # Fail the workflow if this step fails
        run: |
          echo "🚀 Starting daily trading recommendation..."
          echo "Time: $(date)"
          echo "Timezone: $(timedatectl 2>/dev/null | grep 'Time zone' || echo 'UTC')"
          python main.py 2>&1 | tee trading_output.txt
          echo "✅ Trading recommendation completed successfully"
      
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "📊 Daily Trading Recommendation - ${{ vars.DEFAULT_TICKER || 'NVDA' }}"
          to: ${{ secrets.EMAIL_TO || secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            🚀 Daily Trading Recommendation
            
            Ticker: ${{ vars.DEFAULT_TICKER || 'NVDA' }}
            Time: ${{ github.event.repository.updated_at }}
            
            📊 RECOMMENDATION:
            ${{ steps.run-trading.outputs.result || 'Check logs for details' }}
            
            ---
            View full logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            ---
            Generated by Your AI Trading System
      
      - name: Handle Success
        if: success()
        run: |
          echo "✅ Workflow completed successfully at $(date)"
          echo "Recommendation generated for ${{ vars.DEFAULT_TICKER || 'NVDA' }}"
      
      - name: Handle Failure
        if: failure()
        run: |
          echo "❌ Workflow failed at $(date)"
          echo "Check the logs above for errors"
          echo "Common issues:"
          echo "  - Missing POLYGON_API_KEY secret"
          echo "  - Network/API issues"
          echo "  - Missing dependencies"
          exit 1
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_number }}
          path: |
            *.log
            trading_output.txt
          retention-days: 30
          if-no-files-found: warn
